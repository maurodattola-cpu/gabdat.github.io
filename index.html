<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SPORT 360°</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #020617;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    .hero {
      position: relative;
      text-align: center;
      padding: 140px 20px;
      background: url('https://images.unsplash.com/photo-1508098682722-e99c643e7485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      overflow: hidden;
      animation: zoomHero 12s ease-in-out infinite alternate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeUp 1.2s ease;
    }

    .hero h1 {
      font-size: 58px;
    }

    .hero p {
      font-size: 22px;
      color: #e2e8f0;
    }

    .btn {
      background: #3b82f6;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      display: inline-block;
      margin-top: 28px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #2563eb;
    }

    .section {
      padding: 70px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 24px;
      border-radius: 14px;
      width: 260px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #64748b;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes zoomHero {
      from { background-size: 100%; }
      to { background-size: 110%; }
    }
  </style>
</head>

<body>

<header>
  <h2>Gabriele</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#servizi">Servizi</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>SPORT 360°</h1>
    <p>Innovazione digitale nel mondo dello sport</p>
    <a class="btn" href="#servizi">Scopri di più</a>
  </div>
</section>

<section id="servizi" class="section">
  <h2>Servizi</h2>
  <div class="cards">
    <div class="card">Digital Signage</div>
    <div class="card">DOOH Solutions</div>
    <div class="card">UX & Digital Experience</div>
  </div>
</section>

<footer>
  © 2026 Gabriele
</footer>

</body>
</html>
