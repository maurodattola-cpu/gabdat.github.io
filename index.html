<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SPORT 360°</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #020617;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero p {
      color: #94a3b8;
    }

    .btn {
      background: #3b82f6;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      display: inline-block;
      margin-top: 20px;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #64748b;
    }

  .hero {
  position: relative;
  text-align: center;
  padding: 120px 20px;
  background: url('https://images.unsplash.com/photo-1508098682722-e99c643e7485') center/cover no-repeat;
}

.hero::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(2, 6, 23, 0.8);
}

.hero-content {
  position: relative;
  z-index: 1;
}
</style>
</head>

<body>

<header>
  <h2>Gabriele</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#servizi">Servizi</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>SPORT 360°</h1>
    <p>Soluzioni digitali, DOOH e innovazione</p>
    <a class="btn" href="#contatti">Contattami</a>
  </div>
</section>
  <h1>SPORT 360°</h1>
  <p>Soluzioni digitali, DOOH e innovazione</p>
  <a class="btn" href="#contatti">Contattami</a>
</section>

<section id="servizi" class="section">
  <h2>Servizi</h2>
  <div class="card">Digital Signage</div>
  <div class="card">DOOH Solutions</div>
  <div class="card">UX & Digital Experience</div>
</section>


<footer>
  © 2026 Gabriele - All rights reserved
</footer>

</body>
</html>
